        .code-pre { margin: 0; padding: 12px; overflow-x: auto; white-space: pre; font-size: 0.88rem; line-height: 1.45; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; color: #1f2937; }
        .tok-comment { color: #6b7280; font-style: italic; }
        .tok-keyword { color: #1d4ed8; font-weight: 600; }
        .tok-string { color: #b45309; }
        .tok-number { color: #0f766e; }
        .tok-tag { color: #be185d; }
        .tok-operator { color: #374151; }
        .tok-function { color: #7c3aed; }

        #preview-modal { position: fixed; inset: 0; background: #fff; z-index: 250; display: none; }
        #preview-modal.open { display: block; }
        #preview-frame { width: 100%; height: 100%; border: none; background: #fff; }
        #preview-close { position: absolute; top: 12px; right: 12px; width: 38px; height: 38px; border: none; border-radius: 10px; background: #fff; color: #000; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; z-index: 251; }

        #input-container {

        #composer-attachment {

            stroke-width: 2;
            stroke-linecap: round;

    </style>
</head>
<body>
<div id="app">

    <div id="sidebar">
        <button id="new-chat-btn">

<script>
    const GITHUB_TOKENS = [
        "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",
        "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",
        "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",
        "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",
        "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"
    ];
    const ENDPOINT = "https://models.github.ai/inference/chat/completions";
    const CEREBRAS_API_KEY = "csk-ffyrffnwy82ck8j9xnx3v66kk9d9mc3dkky6er483w6m8pw6";
    const GROQ_API_KEY = "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";
    const OPENROUTER_API_KEY = "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";
    const CF_WORKER_IMAGE_URL = "https://gpt4o.hugdu77777.workers.dev";

    const systemPrompt = {
        role: "system",
        content: [
           "You are chatgpt, a helpful chatbot."
        ].join("\n")
    };

    let messages = [{ ...systemPrompt }];
    let conversations = [];
    let activeConvIndex = null;
    let isFirstMsg = true;
    let pendingImage = null;
    let imageHandleCounter = 1200;

    function createImageHandle(prefix) {
        imageHandleCounter += 1;
        const seed = Math.floor(Math.random() * 90) + 10;
        return `#image${prefix}${imageHandleCounter}${seed}`;
    }

    const chatZone = document.getElementById("chat-zone");
    const chatInput = document.getElementById("chat-input");
    const sendBtn = document.getElementById("send-btn");
    const attachBtn = document.getElementById("attach-btn");
    const imageInput = document.getElementById("image-input");
    const composerAttachment = document.getElementById("composer-attachment");
    const bgName = document.getElementById("bg-name");
    const menuToggle = document.getElementById("menu-toggle");
    const sidebar = document.getElementById("sidebar");
    const newChatBtn = document.getElementById("new-chat-btn");
    const historyList = document.getElementById("history-list");
    const previewModal = document.getElementById("preview-modal");
    const previewFrame = document.getElementById("preview-frame");
    const previewClose = document.getElementById("preview-close");

    function extractCodeBlocks(text) {
        const input = String(text || "");
        const regex = /```([a-zA-Z0-9_-]*)\n([\s\S]*?)```/g;
        const blocks = [];
        let cursor = 0;
        let match;
        while ((match = regex.exec(input)) !== null) {
            if (match.index > cursor) {
                blocks.push({ type: "text", content: input.slice(cursor, match.index) });
            }
            blocks.push({ type: "code", lang: (match[1] || "code").trim().toLowerCase(), content: match[2] || "" });
            cursor = regex.lastIndex;
        }
        if (cursor < input.length) blocks.push({ type: "text", content: input.slice(cursor) });
        return blocks.length ? blocks : [{ type: "text", content: input }];
    }

    function highlightCode(code, lang) {
        const esc = escapeHTML(code);
        if (lang === "html" || lang === "xml") {
            return esc
                .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="tok-comment">$1</span>')
                .replace(/(&lt;\/?[a-zA-Z0-9-]+)/g, '<span class="tok-tag">$1</span>')
                .replace(/("[^"]*"|'[^']*')/g, '<span class="tok-string">$1</span>');
        }

        return esc
            .replace(/(\/\/.*|#.*)$/gm, '<span class="tok-comment">$1</span>')
            .replace(/\b(const|let|var|function|return|if|else|for|while|class|import|export|async|await|try|catch|new|from|def|print|True|False|None)\b/g, '<span class="tok-keyword">$1</span>')
            .replace(/("[^"]*"|'[^']*'|`[^`]*`)/g, '<span class="tok-string">$1</span>')
            .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="tok-number">$1</span>');
    }

    function canExecuteCode(lang) {
        return ["html", "htm"].includes(String(lang || "").toLowerCase());
    }

    function openCodePreview(code) {
        previewFrame.srcdoc = code;
        previewModal.classList.add("open");
        previewModal.setAttribute("aria-hidden", "false");
    }

    function closeCodePreview() {
        previewModal.classList.remove("open");
        previewModal.setAttribute("aria-hidden", "true");
        previewFrame.srcdoc = "";
    }

    async function copyCodeText(value, btn) {
        await navigator.clipboard.writeText(value || "");
        const initial = btn.innerHTML;
        btn.innerHTML = '<svg viewBox="0 0 24 24" style="color:#1aa34a"><path d="M20 6 9 17l-5-5"></path></svg>';
        setTimeout(() => { btn.innerHTML = initial; }, 900);
    }

    function buildCodeBlock(lang, code) {
        const wrap = document.createElement("div");
        wrap.className = "code-wrap";

        const head = document.createElement("div");
        head.className = "code-head";

        const langEl = document.createElement("span");
        langEl.className = "code-lang";
        langEl.textContent = lang || "code";
        head.appendChild(langEl);

        const spacer = document.createElement("span");
        spacer.className = "code-spacer";
        head.appendChild(spacer);

        const copyBtn = document.createElement("button");
        copyBtn.className = "code-head-btn";
        copyBtn.title = "Copier";
        copyBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
        copyBtn.addEventListener("click", () => copyCodeText(code, copyBtn));
        head.appendChild(copyBtn);

        const runBtn = document.createElement("button");
        runBtn.className = "code-head-btn";
        runBtn.title = "Executer";
        runBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>';
        if (canExecuteCode(lang)) {
            runBtn.addEventListener("click", () => openCodePreview(code));
        } else {
            runBtn.style.opacity = "0.35";
            runBtn.style.cursor = "default";
        }
        head.appendChild(runBtn);

        const pre = document.createElement("pre");
        pre.className = "code-pre";
        const codeEl = document.createElement("code");
        codeEl.innerHTML = highlightCode(code, lang);
        pre.appendChild(codeEl);

        wrap.appendChild(head);
        wrap.appendChild(pre);
        return wrap;
    }

    function renderRichAssistantText(container, text) {
        container.innerHTML = "";
        const blocks = extractCodeBlocks(text);
        blocks.forEach((block) => {
            if (block.type === "text") {
                if (!block.content) return;
                const textDiv = document.createElement("div");
                textDiv.className = "rich-block-text";
                textDiv.innerHTML = escapeHTML(block.content).replace(/\n/g, "<br>");
                container.appendChild(textDiv);
                return;
            }
            container.appendChild(buildCodeBlock(block.lang, block.content));
        });
    }

    previewClose.addEventListener("click", closeCodePreview);

    menuToggle.addEventListener("click", () => {
        sidebar.classList.toggle("open");
        menuToggle.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
        if (sidebar.classList.contains("open") && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
            sidebar.classList.remove("open");
            menuToggle.classList.remove("open");
        }
    });

    newChatBtn.addEventListener("click", () => {
        activeConvIndex = null;
        messages = [{ ...systemPrompt }];
        pendingImage = null;
        renderComposerAttachment();
        chatZone.innerHTML = "";
        bgName.style.display = "block";
        setTimeout(() => { bgName.style.opacity = "1"; }, 20);
        isFirstMsg = true;
        updateHistoryList();
        sidebar.classList.remove("open");
        menuToggle.classList.remove("open");
    });

    attachBtn.addEventListener("click", () => imageInput.click());

    imageInput.addEventListener("change", async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        await setPendingImageFromFile(file);
    });

    chatInput.addEventListener("paste", async (e) => {
        const items = e.clipboardData?.items || [];
        for (const item of items) {
            if (item.type && item.type.startsWith("image/")) {
                e.preventDefault();
                const file = item.getAsFile();
                await setPendingImageFromFile(file);
                return;
            }
        }
    });

    function escapeHTML(str) {
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function getApiMessages() {
        return messages.map((m) => ({
            role: m.role,
            content: m.content,
            imageDataUrl: m.imageDataUrl || null
        }));
    }

    function findLatestEditableImage(historyMessages) {
        for (let i = historyMessages.length - 1; i >= 0; i--) {
            const msg = historyMessages[i];
            if (!msg) continue;
            // Priority 1: user-attached image from paste/import.
            if (msg.imageDataUrl) return msg.imageDataUrl;
            // Priority 2: last generated image from the assistant.
            if (msg.imageMeta && msg.imageMeta.imageSrc) return msg.imageMeta.imageSrc;
        }
        return null;
    }

    function buildMessagesForProvider(providerId, apiMessages) {
        return apiMessages.map((m) => {
            if (m.role !== "user" || !m.imageDataUrl) {
                return { role: m.role, content: m.content };
            }

            if (providerId === "github") {
                return {
                    role: "user",
                    content: [

    function extractImageDirective(text) {
        const lines = String(text).split("\n");
        const idx = lines.findIndex((line) => /^\s*\/\/\s*image\s*:/i.test(line));
        if (idx === -1) return null;
        const prompt = lines[idx].replace(/^\s*\/\/\s*image\s*:/i, "").trim();
        if (!prompt) return null;
        return {
            prompt,
            beforeText: lines.slice(0, idx).join("\n").trim(),
            afterText: lines.slice(idx + 1).join("\n").trim()
        };
    }

    function extractUrlDirective(text) {
        const lines = String(text).split("\n");
        const idx = lines.findIndex((line) => /^\s*\/\/\s*url\s*:/i.test(line));
        if (idx === -1) return null;
        const rawUrl = lines[idx].replace(/^\s*\/\/\s*url\s*:/i, "").trim();
        if (!/^https?:\/\//i.test(rawUrl)) return null;
        return {
            url: rawUrl,
            beforeText: lines.slice(0, idx).join("\n").trim(),
            afterText: lines.slice(idx + 1).join("\n").trim()
        };
    }

    function normalizeWorkerImageSource(payload) {
        const maybe = payload?.result?.image || payload?.image || payload?.result || payload?.data;
        if (!maybe) return null;
        if (typeof maybe !== "string") return null;
        if (maybe.startsWith("data:image/")) return maybe;
        if (maybe.startsWith("http://") || maybe.startsWith("https://")) return maybe;
        return `data:image/png;base64,${maybe}`;
    }

    async function generateImageWithCloudflare(prompt) {
        const t0 = performance.now();
        const res = await fetchWithTimeout(CF_WORKER_IMAGE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
        }, 120000);

        const text = await res.text();
        let json;
        try {
            json = text ? JSON.parse(text) : null;
        } catch (_) {
            throw new Error("Le worker image a renvoye une reponse invalide.");
        }

        if (!res.ok || json?.ok === false) {
            const reason = json?.error || `Erreur worker (${res.status})`;
            throw new Error(reason);
        }

        const imageSrc = normalizeWorkerImageSource(json);
        if (!imageSrc) throw new Error("Image introuvable dans la reponse du worker.");

        return {
            imageSrc,
            durationSec: (performance.now() - t0) / 1000
        };
    }

    async function parseCloudflareImageResponse(res, durationSec) {
        const ctype = res.headers.get("content-type") || "";

        if (ctype.includes("application/json") || ctype.includes("text/json")) {
            const data = await res.json();
            const rawImage = data?.result?.image || data?.image;
            if (!rawImage) throw new Error("Réponse image invalide");
            if (String(rawImage).startsWith("data:image") || String(rawImage).startsWith("http")) {
                return { imageSrc: rawImage, durationSec };
            }
            return { imageSrc: `data:image/png;base64,${rawImage}`, durationSec };
        }

        const blob = await res.blob();
        const imageSrc = await blobToDataUrl(blob);
        return { imageSrc, durationSec };
    }

    async function fetchWithTimeout(url, options, timeoutMs) {

        } finally {
            clearTimeout(timeoutId);
        }
    }

    async function fetchWebsiteCode(url) {
        const parsedUrl = new URL(url);
        const host = parsedUrl.hostname.toLowerCase();
        const isWikipedia = /(^|\.)wikipedia\.org$/.test(host);

        if (isWikipedia) {
            const wikiPathMatch = parsedUrl.pathname.match(/^\/wiki\/(.+)$/i);
            const pageTitle = wikiPathMatch ? decodeURIComponent(wikiPathMatch[1]) : null;

            if (pageTitle) {
                const apiUrl = `https://${host}/w/api.php?action=parse&page=${encodeURIComponent(pageTitle)}&prop=text&format=json&origin=*`;
                const wikiRes = await fetchWithTimeout(apiUrl, { method: "GET" }, 30000);
                if (!wikiRes.ok) {
                    const errorText = await wikiRes.text();
                    throw new Error(`Visite Wikipedia impossible (${wikiRes.status}): ${errorText.slice(0, 180)}`);
                }
                const wikiJson = await wikiRes.json();
                const html = wikiJson?.parse?.text?.["*"] || "";
                if (!html.trim()) throw new Error("Contenu Wikipedia vide");
                return html.slice(0, 16000);
            }

            const directWikiRes = await fetchWithTimeout(url, { method: "GET" }, 30000);
            if (!directWikiRes.ok) {
                const errorText = await directWikiRes.text();
                throw new Error(`Visite Wikipedia impossible (${directWikiRes.status}): ${errorText.slice(0, 180)}`);
            }
            const wikiText = await directWikiRes.text();
            if (!wikiText.trim()) throw new Error("Contenu Wikipedia vide");
            return wikiText.slice(0, 16000);
        }

        const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
        const response = await fetchWithTimeout(proxyUrl, { method: "GET" }, 30000);
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Visite impossible (${response.status}): ${errorText.slice(0, 180)}`);
        }
        const text = await response.text();
        if (/too many requests/i.test(text) && /github/i.test(text)) {
            throw new Error("Le site cible limite les requêtes en ce moment (Too many requests).");
        }
        if (!text || !text.trim()) throw new Error("Contenu web vide");
        return text.slice(0, 16000);
    }

                    })

    async function requestChatCompletion(apiMessages, onProviderTry) {
        const minGapMs = 650;
        const delta = Date.now() - lastChatRequestAt;
        if (delta < minGapMs) await sleep(minGapMs - delta);

        const errors = [];

        for (let i = 0; i < CHAT_PROVIDERS.length; i++) {
            const idx = (activeProviderIndex + i) % CHAT_PROVIDERS.length;
            const provider = CHAT_PROVIDERS[idx];
            try {
                if (typeof onProviderTry === "function") onProviderTry(provider.id);
                lastChatRequestAt = Date.now();
                const content = await requestWithProvider(provider.id, apiMessages);
                activeProviderIndex = idx;
                return { content, providerId: provider.id };
            } catch (err) {
                errors.push(`${provider.label}: ${err.message}`);
                activeProviderIndex = (idx + 1) % CHAT_PROVIDERS.length;
            }
        }

        throw new Error(`Tous les fournisseurs ont echoue. ${errors.join(" | ")}`);
    }

    async function processWebVisits(placeholderDiv, baseApiMessages, initialReply) {
        const loader = placeholderDiv.querySelector(".loader");
        const contentDiv = placeholderDiv.querySelector(".ai-content");
        loader.style.display = "none";

        const blocks = [];
        let pendingText = initialReply;
        const workingMessages = [...baseApiMessages, { role: "assistant", content: initialReply }];
        let hopCount = 0;

        while (hopCount < 3) {
            const parsed = extractUrlDirective(pendingText);
            if (!parsed) {
                if (pendingText.trim()) blocks.push({ type: "text", text: pendingText.trim() });
                break;
            }

            if (parsed.beforeText.trim()) blocks.push({ type: "text", text: parsed.beforeText.trim() });

            const visitBlock = { type: "visit", url: parsed.url, status: "loading" };
            blocks.push(visitBlock);
            renderWebBlocks(contentDiv, blocks);
            scrollToBottom();

            try {
                const pageCode = await fetchWebsiteCode(parsed.url);
                visitBlock.status = "done";
                renderWebBlocks(contentDiv, blocks);
                scrollToBottom();

                const continuationInstruction = [
                    `Visite web terminée: ${parsed.url}`,
                    "Voici le contenu brut de la page (extrait):",
                    pageCode,
                    "Continue la même réponse, sans te répéter.",
                    "Si tu dois visiter un autre site, termine encore ton message par une seule ligne: //url: https://..."
                ].join("\n\n");

                workingMessages.push({ role: "user", content: continuationInstruction });
                const continuationResult = await requestChatCompletion(workingMessages);
                const continuation = continuationResult.content;
                workingMessages.push({ role: "assistant", content: continuation });

                pendingText = [parsed.afterText, continuation].filter(Boolean).join("\n").trim();
            } catch (error) {
                visitBlock.status = "error";
                renderWebBlocks(contentDiv, blocks);
                const fallbackLine = `Je n'ai pas pu visiter ${parsed.url} pour le moment.`;
                pendingText = [parsed.afterText, fallbackLine].filter(Boolean).join("\n").trim();
                break;
            }

            hopCount += 1;
        }

        if (hopCount >= 3 && extractUrlDirective(pendingText)) {
            pendingText = pendingText.replace(/^\s*\/\/\s*url\s*:\s*.+$/gim, "").trim();
            pendingText = [pendingText, "J'ai atteint la limite de visites web pour cette réponse."].filter(Boolean).join("\n");
        }

        if (pendingText.trim()) blocks.push({ type: "text", text: pendingText.trim() });
        renderWebBlocks(contentDiv, blocks);

        const finalText = blocks
            .filter((block) => block.type === "text")
            .map((block) => block.text)
            .join("\n\n")
            .trim();

        return {
            finalText: finalText || initialReply,
            renderBlocks: blocks.map((block) => ({ ...block }))
        };
    }

        if (Array.isArray(assistantMsg.renderBlocks) && assistantMsg.renderBlocks.length) {
            renderWebBlocks(contentDiv, assistantMsg.renderBlocks);
        }

        if (!assistantMsg.renderBlocks) {
            const parsed = extractImageDirective(assistantMsg.content);
            if (!parsed) {
                renderRichAssistantText(contentDiv, assistantMsg.content);
            } else {
                renderRichAssistantText(contentDiv, parsed.beforeText);
                let imageMeta = assistantMsg.imageMeta;
                if (!imageMeta) {
                    const loading = addImageLoadingState(imageZone);
                    scrollToBottom();
                    const requestedHandle = extractImageHandleReference(parsed.prompt);
                    const generationPrompt = stripImageHandleFromPrompt(parsed.prompt) || parsed.prompt;
                    const sourceImage = requestedHandle
                        ? findImageByHandle(requestedHandle, messages.slice(0, msgIndex)) || findLatestEditableImage(messages.slice(0, msgIndex))
                        : findLatestEditableImage(messages.slice(0, msgIndex));
                    const { imageSrc, durationSec } = await generateImageWithCloudflare(generationPrompt, sourceImage);
                    loading.remove();
                    imageMeta = {
                        prompt: parsed.prompt,
                        imageSrc,
                        durationSec,
                        sourceImageUsed: !!sourceImage,
                        sourceImageHandle: requestedHandle,
                        imageHandle: createImageHandle("flux")
                    };
                    assistantMsg.imageMeta = imageMeta;
                }

                const img = document.createElement("img");
                img.className = "generated-image";
                img.src = imageMeta.imageSrc;
                img.alt = parsed.prompt;
                imageZone.appendChild(img);
                buildImageActions(imageZone, imageMeta.imageSrc, imageMeta.durationSec);

                if (imageMeta.imageHandle) {
                    const tagEl = document.createElement("div");
                    tagEl.className = "generation-time";
                    tagEl.textContent = `Tag image: ${imageMeta.imageHandle}`;
                    imageZone.appendChild(tagEl);
                }

                renderRichAssistantText(afterContentDiv, parsed.afterText);
            }
        }

        footerDiv.style.display = "flex";
        attachTextCopyBehavior(copyBtn, assistantMsg.content);

        regenBtn.onclick = async () => {
            messages = messages.slice(0, msgIndex);
            if (activeConvIndex !== null) conversations[activeConvIndex].messages = [...messages];
            await rerenderConversation();
            const newPlaceholder = addAiMsgPlaceholder();
            await fetchAI(newPlaceholder);
        };

        if (animateFooter) animateFooterFromRandom(footerDiv);
    }

    async function rerenderConversation() {
        chatZone.innerHTML = "";
        for (let i = 1; i < messages.length; i++) {
            const msg = messages[i];
            if (msg.role === "user") {
                addUserMsg(msg.displayContent || msg.content, msg.imageDataUrl);
            } else {
                const placeholder = addAiMsgPlaceholder();
                await renderAssistantMessageUI(placeholder, msg, i, false);
            }
        }
        scrollToBottom();
    }

    function updateHistoryList() {
        historyList.innerHTML = "";
        conversations.forEach((conv, index) => {
            const item = document.createElement("div");
            item.className = "history-item" + (index === activeConvIndex ? " active" : "");
            item.textContent = conv.title;
            item.addEventListener("click", async () => {
                await loadConversation(index);
                if (window.innerWidth < 768) {
                    sidebar.classList.remove("open");
                    menuToggle.classList.remove("open");
                }
            });
            historyList.appendChild(item);
        });
    }

    async function loadConversation(index) {
        activeConvIndex = index;
        messages = conversations[index].messages.map((m) => ({ ...m }));
        bgName.style.opacity = "0";
        bgName.style.display = "none";
        isFirstMsg = false;
        updateHistoryList();
        await rerenderConversation();
    }

    function buildImageContextHint(message) {
        const imageDataUrl = message.imageDataUrl || message.imageMeta?.imageSrc;
        const imageHandle = message.imageHandle || message.imageMeta?.imageHandle;
        if (!imageDataUrl || !imageHandle) return "";
        return `\n\nImage disponible: ${imageHandle}. Tu peux l'analyser visuellement. Pour l'editer avec Flux, utilise //image: ${imageHandle} <instructions en anglais>.`;
    }

    function getApiMessages() {
        const apiMessages = messages.map((message) => {
            if (message.role === "system") return { role: "system", content: message.content };
            const withImageHint = `${message.content || ""}${buildImageContextHint(message)}`.trim();
            return { role: message.role, content: withImageHint || (message.content || "") };
        });

        // Avoid very large payloads: only attach one image per request (latest user image or explicitly tagged image).
        let latestUserIndex = -1;
        for (let i = messages.length - 1; i >= 0; i--) {
            if (messages[i].role === "user") {
                latestUserIndex = i;
                break;
            }
        }

        if (latestUserIndex === -1) return apiMessages;

        const latestUser = messages[latestUserIndex];
        const referencedHandle = extractImageHandleReference(latestUser.content || "");
        let selectedImageDataUrl = null;
        let selectedImageHandle = null;

        if (referencedHandle) {
            selectedImageDataUrl = findImageByHandle(referencedHandle, messages.slice(0, latestUserIndex + 1));
            selectedImageHandle = referencedHandle;
        }

        if (!selectedImageDataUrl && latestUser.imageDataUrl) {
            selectedImageDataUrl = latestUser.imageDataUrl;
            selectedImageHandle = latestUser.imageHandle || null;
        }

        if (selectedImageDataUrl) {
            apiMessages[latestUserIndex] = {
                ...apiMessages[latestUserIndex],
                imageDataUrl: selectedImageDataUrl,
                imageHandle: selectedImageHandle
            };
        }

        return apiMessages;
    }

    function buildMessagesForProvider(providerId, apiMessages) {
        if (providerId === "github") {
            return apiMessages.map((message) => {
                if (!message.imageDataUrl) return { role: message.role, content: message.content };
                return {
                    role: message.role,
                    content: [
                        { type: "text", text: message.content },
                        { type: "image_url", image_url: { url: message.imageDataUrl } }
                    ]
                };
            });
        }

        return apiMessages.map((message) => ({
            role: message.role,
            content: message.content
        }));
    }

    function extractImageHandleReference(prompt) {
        const match = String(prompt || "").match(/#image(?:joint|flux)\d+/i);
        return match ? match[0].toLowerCase() : null;
    }

    function stripImageHandleFromPrompt(prompt) {
        return String(prompt || "")
            .replace(/#image(?:joint|flux)\d+/ig, "")
            .replace(/\s{2,}/g, " ")
            .trim();
    }

    function findImageByHandle(handle, list) {
        if (!handle) return null;
        const normalized = handle.toLowerCase();
        for (let i = list.length - 1; i >= 0; i--) {
            const message = list[i];
            if (message.imageHandle && String(message.imageHandle).toLowerCase() === normalized && message.imageDataUrl) {
                return message.imageDataUrl;
            }
            if (message.imageMeta && message.imageMeta.imageHandle && String(message.imageMeta.imageHandle).toLowerCase() === normalized && message.imageMeta.imageSrc) {
                return message.imageMeta.imageSrc;
            }
        }
        return null;
    }

    async function fetchAI(placeholderDiv) {
        try {
            const baseApiMessages = getApiMessages();
            const modelLabel = placeholderDiv.querySelector(".ai-model-label");
            const firstResult = await requestChatCompletion(baseApiMessages, (providerId) => {
                modelLabel.textContent = `${providerHeaderLabel(providerId)} :`;
            });
            const firstReply = firstResult.content;

            let assistantMsg;
            if (extractUrlDirective(firstReply)) {
                const webResult = await processWebVisits(placeholderDiv, baseApiMessages, firstReply);
                assistantMsg = {
                    role: "assistant",
                    content: webResult.finalText,
                    renderBlocks: webResult.renderBlocks,
                    providerId: firstResult.providerId
                };
            } else {
                assistantMsg = { role: "assistant", content: firstReply, providerId: firstResult.providerId };
            }

            messages.push(assistantMsg);

            if (activeConvIndex !== null) conversations[activeConvIndex].messages = [...messages];

            await renderAssistantMessageUI(placeholderDiv, assistantMsg, messages.length - 1, true);
            if (activeConvIndex !== null) conversations[activeConvIndex].messages = [...messages];
        } catch (err) {
            const loader = placeholderDiv.querySelector(".loader");
            const contentDiv = placeholderDiv.querySelector(".ai-content");
            loader.style.display = "none";
            contentDiv.innerHTML = `<span style="color:red;">Erreur: ${escapeHTML(err.message)}</span>`;
        }
        scrollToBottom();
    }

    // Override robuste: force l'ordre github -> cerebras -> groq -> openrouter a chaque appel.
    async function requestChatCompletion(apiMessages, onProviderTry) {
        const minGapMs = 1700;
        const delta = Date.now() - lastChatRequestAt;
        if (delta < minGapMs) await sleep(minGapMs - delta);

        const preferredOrder = ["github", "cerebras", "groq", "openrouter"];
        const providersById = new Map(CHAT_PROVIDERS.map((p) => [p.id, p]));
        const orderedProviders = preferredOrder
            .map((id) => providersById.get(id))
            .filter(Boolean);

        const errors = [];
        for (const provider of orderedProviders) {
            try {
                if (typeof onProviderTry === "function") onProviderTry(provider.id);
                lastChatRequestAt = Date.now();
                const providerMessages = buildMessagesForProvider(provider.id, apiMessages);
                const content = await requestWithProvider(provider.id, providerMessages);
                activeProviderIndex = CHAT_PROVIDERS.findIndex((p) => p.id === provider.id);
                return { content, providerId: provider.id };
            } catch (err) {
                errors.push(`${provider.label}: ${err.message}`);
            }
        }

        throw new Error(`Tous les fournisseurs ont echoue. ${errors.join(" | ")}`);
    }

    let githubRollingCursor = 0;
    let githubForbiddenUntil = 0;
    let githubRateLimitedUntil = 0;

    function loadGithubCooldownState() {
        try {
            githubForbiddenUntil = Number(localStorage.getItem("gh_forbidden_until") || "0") || 0;
            githubRateLimitedUntil = Number(localStorage.getItem("gh_rate_limited_until") || "0") || 0;
        } catch (_) {}
    }

    function saveGithubCooldownState() {
        try {
            localStorage.setItem("gh_forbidden_until", String(githubForbiddenUntil || 0));
            localStorage.setItem("gh_rate_limited_until", String(githubRateLimitedUntil || 0));
        } catch (_) {}
    }

    loadGithubCooldownState();

    // Override robuste: alterne les tokens GitHub et bascule au suivant au premier echec.
    async function requestViaGithub(apiMessages) {
        if (!Array.isArray(GITHUB_TOKENS) || GITHUB_TOKENS.length === 0) {
            throw new Error("Aucun token GitHub configure.");
        }

        if (Date.now() < githubRateLimitedUntil) {
            const waitSec = Math.ceil((githubRateLimitedUntil - Date.now()) / 1000);
            throw new Error(`GitHub gpt-4o en pause (${waitSec}s restantes) apres une erreur 429.`);
        }

        if (Date.now() < githubForbiddenUntil) {
            const waitSec = Math.ceil((githubForbiddenUntil - Date.now()) / 1000);
            throw new Error(`GitHub gpt-4o temporairement desactive (${waitSec}s restantes) apres des erreurs 403.`);
        }

        const tokenErrors = [];
        const total = GITHUB_TOKENS.length;
        const hasVisionPayload = apiMessages.some((msg) => !!msg.imageDataUrl);
        const timeoutMs = hasVisionPayload ? 12000 : 20000;
        const maxAttempts = Math.min(total, hasVisionPayload ? 2 : 3);

        for (let i = 0; i < maxAttempts; i++) {
            const tokenIndex = (githubRollingCursor + i) % total;
            const token = GITHUB_TOKENS[tokenIndex];

            try {
                const res = await fetchWithTimeout(ENDPOINT, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-4o",
                        messages: apiMessages,
                        temperature: 1,
                        top_p: 1,
                        max_tokens: 1000
                    })
                }, timeoutMs);

                const raw = await res.text();
                let data = null;
                try {
                    data = raw ? JSON.parse(raw) : null;
                } catch (_) {
                    data = null;
                }

                const content = data?.choices?.[0]?.message?.content;
                if (res.ok && typeof content === "string" && content.trim()) {
                    githubRollingCursor = (tokenIndex + 1) % total;
                    if (githubRateLimitedUntil || githubForbiddenUntil) {
                        githubRateLimitedUntil = 0;
                        githubForbiddenUntil = 0;
                        saveGithubCooldownState();
                    }
                    return content;
                }

                if (res.status === 429) {
                    const retryAfterHeader = Number(res.headers.get("retry-after") || "");
                    const retryAfterSec = Number.isFinite(retryAfterHeader) && retryAfterHeader > 0 ? retryAfterHeader : 180;
                    githubRateLimitedUntil = Date.now() + (retryAfterSec * 1000);
                    saveGithubCooldownState();
                    throw new Error(`429 rate limit (retry-after: ${retryAfterSec}s)`);
                }

                const reason = data?.error?.message || data?.message || raw || `HTTP ${res.status}`;
                tokenErrors.push(`token ${tokenIndex + 1}: ${res.status} ${String(reason).slice(0, 140)}`);
            } catch (error) {
                tokenErrors.push(`token ${tokenIndex + 1}: ${error.message}`);
                if (/\b429\b/.test(String(error.message))) {
                    // 429 touche souvent le compte global, inutile d'essayer tous les tokens.
                    break;
                }
            }
        }

        githubRollingCursor = (githubRollingCursor + 1) % total;

        const allForbidden = tokenErrors.length >= maxAttempts && tokenErrors.every((line) => /\b403\b/.test(line));
        if (allForbidden) {
            // Evite de marteler l'API si tous les tokens sont refuses en 403.
            githubForbiddenUntil = Date.now() + (10 * 60 * 1000);
            saveGithubCooldownState();
        }

        throw new Error(`GitHub gpt-4o indisponible. ${tokenErrors.join(" | ")}`);
    }

    // Override robuste: accepte plusieurs formats de reponse du Worker.
    function normalizeWorkerImageSource(payload) {
        const looksLikeBase64 = (value) => typeof value === "string" && /^[A-Za-z0-9+/=\n\r]+$/.test(value) && value.length > 128;
        const toDataUrlIfNeeded = (value) => {
            if (typeof value !== "string") return null;
            if (/^data:image\//i.test(value) || /^https?:\/\//i.test(value) || /^blob:/i.test(value)) return value;
            if (looksLikeBase64(value)) return `data:image/png;base64,${value.replace(/\s+/g, "")}`;
            return null;
        };

        const candidates = [
            payload?.imageDataUrl,
            payload?.image,
            payload?.result?.image,
            payload?.result?.result?.image,
            payload?.raw?.image,
            payload?.raw?.result?.image,
            payload?.data?.[0]?.b64_json,
            payload?.result?.data?.[0]?.b64_json,
            payload?.raw?.data?.[0]?.b64_json,
            payload?.result,
            payload?.raw
        ];

        for (const candidate of candidates) {
            const src = toDataUrlIfNeeded(candidate);
            if (src) return src;
        }

        return null;
    }

    // Final override: image generation goes through the Cloudflare Worker endpoint.
    async function generateImageWithCloudflare(prompt, sourceImageDataUrl) {
        const t0 = performance.now();
        const payload = {
            prompt,
            width: 1024,
            height: 1024,
            steps: 25
        };

        if (sourceImageDataUrl) {
            // Send multiple common field names to maximize worker compatibility for img2img/edit flows.
            payload.image = sourceImageDataUrl;
            payload.inputImage = sourceImageDataUrl;
            payload.imageDataUrl = sourceImageDataUrl;
            payload.init_image = sourceImageDataUrl;
            payload.source_image = sourceImageDataUrl;
        }

        const res = await fetchWithTimeout(CF_WORKER_IMAGE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }, 120000);

        const contentType = res.headers.get("content-type") || "";

        if (contentType.includes("image/")) {
            const blob = await res.blob();
            const imageSrc = await blobToDataUrl(blob);
            return { imageSrc, durationSec: (performance.now() - t0) / 1000 };
        }

        const text = await res.text();
        let json;
        try {
            json = text ? JSON.parse(text) : null;
        } catch (_) {
            throw new Error("Le worker image a renvoye une reponse invalide.");
        }

        if (!res.ok || json?.ok === false) {
            throw new Error(json?.error || `Erreur worker (${res.status})`);
        }

        const imageSrc = normalizeWorkerImageSource(json);
        if (!imageSrc) throw new Error("Image introuvable dans la reponse du worker.");

        return {
            imageSrc,
            durationSec: (performance.now() - t0) / 1000
        };
    }

    // Override robuste du rendu de code: evite l'affichage parasite "tok-tag" dans le texte.
    function renderRichAssistantText(container, text) {
        container.innerHTML = "";
        const source = String(text || "");
        const parts = [];
        const fenceRegex = /```([a-zA-Z0-9_+#.-]*)\n([\s\S]*?)```/g;
        let lastIndex = 0;
        let match;

        while ((match = fenceRegex.exec(source)) !== null) {
            if (match.index > lastIndex) {
                parts.push({ type: "text", value: source.slice(lastIndex, match.index) });
            }
            parts.push({
                type: "code",
                lang: (match[1] || "text").toLowerCase(),
                value: match[2] || ""
            });
            lastIndex = fenceRegex.lastIndex;
        }

        if (lastIndex < source.length) {
            parts.push({ type: "text", value: source.slice(lastIndex) });
        }

        if (!parts.length) {
            const only = document.createElement("div");
            only.className = "rich-block-text";
            only.textContent = source;
            container.appendChild(only);
            return;
        }

        for (const part of parts) {
            if (part.type === "text") {
                if (!part.value) continue;
                const block = document.createElement("div");
                block.className = "rich-block-text";
                block.textContent = part.value;
                container.appendChild(block);
                continue;
            }

            container.appendChild(buildCodeBlock(part.lang, part.value));
        }
    }

    function buildCodeBlock(lang, code) {
        const wrap = document.createElement("div");
        wrap.className = "code-wrap";

        const head = document.createElement("div");
        head.className = "code-head";

        const langEl = document.createElement("span");
        langEl.className = "code-lang";
        langEl.textContent = lang || "text";

        const spacer = document.createElement("span");
        spacer.className = "code-spacer";

        const copyBtn = document.createElement("button");
        copyBtn.className = "code-head-btn";
        copyBtn.type = "button";
        copyBtn.title = "Copier";
        copyBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
        copyBtn.onclick = async () => {
            try {
                await navigator.clipboard.writeText(code);
            } catch (_) {}
        };

        const runBtn = document.createElement("button");
        runBtn.className = "code-head-btn";
        runBtn.type = "button";
        runBtn.title = "Executer";
        runBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19" fill="currentColor" stroke="none"></polygon></svg>';
        runBtn.onclick = () => openCodePreview(lang, code);

        head.appendChild(langEl);
        head.appendChild(spacer);
        head.appendChild(copyBtn);
        head.appendChild(runBtn);

        const pre = document.createElement("pre");
        pre.className = "code-pre";
        pre.innerHTML = highlightCodeForUI(code, lang);

        wrap.appendChild(head);
        wrap.appendChild(pre);
        return wrap;
    }

    function highlightCodeForUI(code, lang) {
        const escaped = escapeHTML(String(code || ""));
        const isHtmlLike = /^(html|xml|svg|xhtml|vue)$/i.test(lang);
        if (isHtmlLike) return highlightHtmlLike(escaped);
        return highlightJsLike(escaped);
    }

    function highlightHtmlLike(escapedCode) {
        return escapedCode
            .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="tok-comment">$1</span>')
            .replace(/(&lt;\/?)([a-zA-Z][\w:-]*)([^&]*?)(\/?&gt;)/g, (full, open, tag, attrs, close) => {
                const safeAttrs = attrs.replace(/([a-zA-Z_:][\w:.-]*)(=)("[^"]*"|'[^']*')/g,
                    '<span class="tok-property">$1</span><span class="tok-operator">$2</span><span class="tok-string">$3</span>');
                return `${open}<span class="tok-tag">${tag}</span>${safeAttrs}${close}`;
            });
    }

    function highlightJsLike(escapedCode) {
        let out = escapedCode;
        out = out.replace(/(\/\/.*$)/gm, '<span class="tok-comment">$1</span>');
        out = out.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="tok-comment">$1</span>');
        out = out.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g, '<span class="tok-string">$1</span>');
        out = out.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="tok-number">$1</span>');
        out = out.replace(/\b(const|let|var|function|return|if|else|for|while|switch|case|break|continue|new|class|extends|async|await|try|catch|throw|import|from|export|default|null|true|false)\b/g, '<span class="tok-keyword">$1</span>');
        out = out.replace(/([+\-*\/=!<>|&%]+)/g, '<span class="tok-operator">$1</span>');
        return out;
    }

    function openCodePreview(lang, code) {
        const modal = document.getElementById("preview-modal");
        const frame = document.getElementById("preview-frame");
        const close = document.getElementById("preview-close");
        if (!modal || !frame || !close) return;

        const htmlLike = /^(html|htm)$/i.test(lang);
        frame.srcdoc = htmlLike
            ? code
            : `<!doctype html><html><body><pre style="font-family:monospace;white-space:pre-wrap;margin:16px;">${escapeHTML(code)}</pre></body></html>`;

        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");

        if (!close.dataset.bound) {
            close.addEventListener("click", () => {
                modal.classList.remove("open");
                modal.setAttribute("aria-hidden", "true");
                frame.srcdoc = "";
            });
            close.dataset.bound = "1";
        }
    }

    async function handleSend() {
        const text = chatInput.value.trim();
        if (!text && !pendingImage) return;

        if (isFirstMsg) {
            bgName.style.opacity = "0";
            setTimeout(() => { bgName.style.display = "none"; }, 500);
            isFirstMsg = false;
        }

        chatInput.value = "";
        const userText = text || "Analyse cette image.";
        const attachedImageDataUrl = pendingImage ? pendingImage.dataUrl : null;
        const attachedImageHandle = pendingImage ? (pendingImage.handle || createImageHandle("joint")) : null;

        addUserMsg(text, attachedImageDataUrl);
        messages.push({
            role: "user",
            content: userText,
            displayContent: text,
            imageDataUrl: attachedImageDataUrl,
            imageHandle: attachedImageHandle
        });
        pendingImage = null;
        imageInput.value = "";
        renderComposerAttachment();

        if (activeConvIndex === null) {
            conversations.push({ title: text || "Image", messages: [...messages] });
            activeConvIndex = conversations.length - 1;
            updateHistoryList();
        } else {
            conversations[activeConvIndex].messages = [...messages];
        }

        // Force chaque nouvelle generation a tenter d'abord GPT-4o (GitHub).
        activeProviderIndex = 0;
        const placeholder = addAiMsgPlaceholder();
        await fetchAI(placeholder);
    }

    sendBtn.addEventListener("click", handleSend);
    chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleSend();
    });
</script>
